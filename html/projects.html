  <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Allyssa's Projects</title>
        <link rel="stylesheet" href="/css/projects.css">
    </head>

    <body>
      <!-- JS to show header -->
      <div class="header">
        <script>
          fetch('/html/header.html')
              .then(response => response.text())
              .then(html => {
                  document.getElementsByClassName('header')[0].innerHTML = html;
              })
              .catch(error => console.error('Error loading content:', error));
        </script>
      </div>
      <!-- JS to show menu -->
      <div class="menu"> 
        <script>
          fetch('/html/menu.html')
              .then(response => response.text())
              .then(html => {
                  document.getElementsByClassName('menu')[0].innerHTML = html;
              })
              .catch(error => console.error('Error loading content:', error));
        </script>
      </div>
      <div class="strip">
        <img src="../images/python.png" class="strip-image" alt="Python Logo" data-label="Python">
        <img src="../images/c.png" class="strip-image" alt="C logo" data-label="C">
        <img src="../images/cpp.png" class="strip-image" alt="C++ logo" data-label="C++">
        <img src="../images/typescript.png" class="strip-image" alt="TypeScript Logo" data-label="TypeScript">
        <!-- <img src="../images/sql.png" class="carousel-image" alt="SQL Logo"> -->
        <img src="../images/javascript.png" class="strip-image" alt="Javascript Logo" data-label="Javascript">
        <img src="../images/html.png" class="strip-image" alt="HTML Logo" data-label="HTML">
        <img src="../images/css.png" class="strip-image" alt="CSS Logo" data-label="CSS">
        <img src="../images/php.png" class="strip-image" alt="PHP Logo" data-label="PHP">
      </div>

      <!-- JS to show footer -->
      <footer>
        <script>
          fetch('/html/footer.html')
              .then(response => response.text())
              .then(html => {
                  document.getElementsByTagName('footer')[0].innerHTML = html;
              })
              .catch(error => console.error('Error loading content:', error));
        </script>
      </footer>
      <script src="js/carousel.js"></script>
    </body>
</html>
