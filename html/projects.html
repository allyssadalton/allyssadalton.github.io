  <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Allyssa's Projects</title>
        <link rel="stylesheet" href="/css/index.css">
    </head>

    <body>
      <!-- JS to show header -->
      <div class="header">
        <script>
          fetch('/html/header.html')
              .then(response => response.text())
              .then(html => {
                  document.getElementsByClassName('header')[0].innerHTML = html;
              })
              .catch(error => console.error('Error loading content:', error));
        </script>
      </div>
      <!-- JS to show menu -->
      <div class="menu"> 
        <script>
          fetch('/html/menu.html')
              .then(response => response.text())
              .then(html => {
                  document.getElementsByClassName('menu')[0].innerHTML = html;
              })
              .catch(error => console.error('Error loading content:', error));
        </script>
      </div>
      <div class="carousel">
        <img src="images/python.jpg" class="carousel-image active" alt="Python Logo">
        <img src="images/c.jpg" class="carousel-image" alt="C logo">
        <img src="images/cpp.jpg" class="carousel-image" alt="C++ logo">
        <img src="images/ts.jpg" class="carousel-image" alt="TypeScript Logo">
        <img src="images/sql.jpg" class="carousel-image" alt="SQL Logo">
        <img src="images/js.jpg" class="carousel-image" alt="Javascript Logo">
        <img src="images/html.jpg" class="carousel-image" alt="HTML Logo">
        <img src="images/css.jpg" class="carousel-image" alt="CSS Logo">

        <!-- Arrows -->
        <div class="arrow left-arrow" id="prev">❮</div>
        <div class="arrow right-arrow" id="next">❯</div>
      </div>

      <!-- JS to show footer -->
      <footer>
        <script>
          fetch('/html/footer.html')
              .then(response => response.text())
              .then(html => {
                  document.getElementsByTagName('footer')[0].innerHTML = html;
              })
              .catch(error => console.error('Error loading content:', error));
        </script>
      </footer>
      <script src="js/carousel.js"></script>
    </body>
</html>
